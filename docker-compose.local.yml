# Local development stack for divine-blossom e2e testing.
# Usage: docker compose -f docker-compose.local.yml up -d
#
# This starts:
#   - minio (S3-compatible storage) on port 9000
#   - divine-blossom (Viceroy/WASM) on port 7676 (host: 7677 if 7676 is in use)
#
# Build first: docker compose -f docker-compose.local.yml build

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/divine-blossom-local;
      echo 'Bucket created successfully';
      "

  blossom:
    build:
      context: .
      dockerfile: Dockerfile.local
    ports:
      - "7676:7676"
    depends_on:
      minio-init:
        condition: service_completed_successfully
